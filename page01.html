<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>page01</title>
  <style>
    :root {
      --bg1: #0f2027;
      --bg2: #203a43;
      --bg3: #2c5364;
      --line: #ffffff;
      --accent: #63f7e7;
      --text: #ffffff;
      --muted: #b7c6d0;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, Helvetica, sans-serif;
      background: linear-gradient(145deg, var(--bg1), var(--bg2), var(--bg3));
      color: var(--text);
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .panel {
      width: min(420px, 100%);
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 16px;
      backdrop-filter: blur(4px);
      padding: 24px 22px;
    }

    .icons {
      display: flex;
      justify-content: center;
      gap: 14px;
      margin-bottom: 22px;
    }

    .icons svg {
      width: 24px;
      height: 24px;
      fill: var(--text);
      opacity: 0.95;
    }

    form {
      display: grid;
      gap: 18px;
    }

    .field {
      position: relative;
      padding-top: 14px;
    }

    .field input[type="text"],
    .field input[type="email"],
    .field input[type="password"] {
      width: 100%;
      background: transparent;
      border: none;
      border-bottom: 2px solid var(--line);
      color: var(--text);
      font-size: 16px;
      padding: 8px 2px 7px;
      outline: none;
      transition: border-color 220ms ease;
    }

    .field label {
      position: absolute;
      left: 2px;
      top: 24px;
      color: var(--muted);
      pointer-events: none;
      transition: all 220ms ease;
    }

    .field input:focus,
    .field input:not(:placeholder-shown) {
      border-bottom-color: var(--accent);
    }

    .field input:focus + label,
    .field input:not(:placeholder-shown) + label {
      top: 0;
      color: var(--accent);
      font-size: 12px;
      letter-spacing: 0.2px;
    }

    .drop-zone {
      width: 100%;
      min-height: 50px;
      border-bottom: 2px solid var(--line);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      color: var(--muted);
      cursor: pointer;
      transition: border-color 220ms ease, color 220ms ease, background 220ms ease;
      padding: 8px 2px;
      text-align: center;
      font-size: 14px;
    }

    .drop-zone svg {
      width: 20px;
      height: 20px;
      fill: currentColor;
      flex: 0 0 auto;
    }

    .drop-zone.active {
      border-bottom-color: var(--accent);
      color: var(--accent);
      background: rgba(99, 247, 231, 0.08);
    }

    .agree {
      display: flex;
      gap: 10px;
      align-items: center;
      color: var(--muted);
      font-size: 14px;
    }

    .actions {
      display: flex;
      gap: 10px;
    }

    button {
      flex: 1;
      border: 1px solid rgba(255, 255, 255, 0.4);
      background: transparent;
      color: var(--text);
      padding: 10px 14px;
      border-radius: 8px;
      cursor: pointer;
      transition: all 200ms ease;
    }

    button:hover {
      border-color: var(--accent);
      color: var(--accent);
    }
  </style>
</head>
<body>
  <section class="panel">
    <div class="icons">
      <svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
      <svg viewBox="0 0 24 24"><path d="M12 12c2.7 0 8 1.34 8 4v2H4v-2c0-2.66 5.3-4 8-4zm0-2a4 4 0 1 0 0-8 4 4 0 0 0 0 8z"/></svg>
      <svg viewBox="0 0 24 24"><path d="M12 2a10 10 0 0 0-3.16 19.49c.5.09.66-.22.66-.48v-1.7c-2.78.61-3.37-1.17-3.37-1.17-.45-1.16-1.1-1.47-1.1-1.47-.91-.62.06-.61.06-.61 1 .07 1.52 1.03 1.52 1.03.9 1.52 2.36 1.08 2.93.83.09-.65.35-1.08.63-1.32-2.22-.25-4.55-1.11-4.55-4.94 0-1.09.39-1.99 1.03-2.69-.11-.25-.45-1.28.1-2.66 0 0 .84-.27 2.75 1.03a9.6 9.6 0 0 1 5 0c1.9-1.3 2.75-1.03 2.75-1.03.54 1.38.2 2.41.1 2.66.64.7 1.03 1.6 1.03 2.69 0 3.84-2.33 4.69-4.56 4.94.36.31.69.93.69 1.88V21c0 .27.18.58.67.48A10 10 0 0 0 12 2z"/></svg>
      <svg viewBox="0 0 24 24"><path d="M12 2 4 5v6c0 5.55 3.84 10.74 8 12 4.16-1.26 8-6.45 8-12V5l-8-3zm0 10.99h6c-.45 3.62-2.86 6.84-6 7.98v-7.98h-6V6.3l6-2.25v8.94z"/></svg>
    </div>

    <form>
      <div class="field">
        <input id="name" type="text" placeholder=" " required>
        <label for="name">Nombre</label>
      </div>

      <div class="field">
        <input id="email" type="email" placeholder=" " required>
        <label for="email">Email</label>
      </div>

      <div class="field">
        <input id="pass" type="password" placeholder=" " required>
        <label for="pass">Password</label>
      </div>

      <div id="dropZone" class="drop-zone">
        <svg viewBox="0 0 24 24"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 16H5V5h14v14zM8.5 13.5 11 17l3.5-4.5L19 18H5l3.5-4.5z"/></svg>
        <span id="fileName">Arrastra una imagen aquí</span>
      </div>
      <input id="fileInput" type="file" accept="image/*" hidden>

      <label class="agree">
        <input type="checkbox">
        Acepto términos y condiciones
      </label>

      <div class="actions">
        <button type="submit">Guardar</button>
        <button type="reset">Limpiar</button>
      </div>
    </form>
  </section>

  <script>
    const dropZone = document.getElementById("dropZone");
    const fileName = document.getElementById("fileName");
    const fileInput = document.getElementById("fileInput");

    function showFile(file) {
      if (!file) return;
      fileName.textContent = file.name;
      dropZone.classList.add("active");
    }

    dropZone.addEventListener("click", () => fileInput.click());
    fileInput.addEventListener("change", (e) => showFile(e.target.files[0]));

    ["dragenter", "dragover"].forEach((eventName) => {
      dropZone.addEventListener(eventName, (e) => {
        e.preventDefault();
        dropZone.classList.add("active");
      });
    });

    ["dragleave", "drop"].forEach((eventName) => {
      dropZone.addEventListener(eventName, (e) => {
        e.preventDefault();
        if (eventName === "drop") {
          const file = e.dataTransfer.files[0];
          if (file && file.type.startsWith("image/")) {
            showFile(file);
          }
        }
        if (eventName === "dragleave") {
          dropZone.classList.remove("active");
        }
      });
    });
  </script>
</body>
</html>
