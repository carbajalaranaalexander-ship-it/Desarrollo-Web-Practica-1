<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>page02</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="wrap">
    <section class="box">
      <div class="icons">
        <button class="icon-btn" type="button" data-icon="brightness">
          <svg viewBox="0 0 24 24"><path d="M6.76 4.84 5.35 3.43 3.93 4.84l1.41 1.41 1.42-1.41zm10.48 0 1.41-1.41 1.42 1.41-1.41 1.41-1.42-1.41zM12 5a7 7 0 1 0 0 14 7 7 0 0 0 0-14zm0-5h-1v3h2V0h-1zm0 21h-1v3h2v-3h-1zM0 13h3v-2H0v2zm21 0h3v-2h-3v2zM4.84 20.07l1.41 1.41 1.42-1.41-1.41-1.42-1.42 1.42zm14.32-1.42-1.41 1.42 1.41 1.41 1.42-1.41-1.42-1.42z"/></svg>
        </button>
        <button class="icon-btn" type="button" data-icon="diamond">
          <svg viewBox="0 0 24 24"><path d="m12 2 4.5 4.5L12 22 7.5 6.5 12 2zm0 3.06L9.44 7.62 12 16.4l2.56-8.78L12 5.06z"/></svg>
        </button>
        <button class="icon-btn" type="button" data-icon="clipboard">
          <svg viewBox="0 0 24 24"><path d="M16 2H8c-1.1 0-2 .9-2 2H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-2h2a2 2 0 0 0 2-2V8l-6-6zm0 2.5 3.5 3.5H16V4.5zM8 4h8v2H8V4zm8 16H4V6h2v2h10V20zm4-4h-2V6h.5L20 7.5V16z"/></svg>
        </button>
        <button class="icon-btn" type="button" data-icon="code">
          <svg viewBox="0 0 24 24"><path d="m8.7 16.7-4-4 4-4L7.3 7.3 1.6 13l5.7 5.7 1.4-1.4zm6.6 0 4-4-4-4 1.4-1.4L22.4 13l-5.7 5.7-1.4-1.4z"/></svg>
        </button>
      </div>

      <div class="slider-group">
        <div class="row">
          <svg class="slider-icon" viewBox="0 0 24 24"><path d="M3 10v4h4l5 4V6L7 10H3zm13.5 2c0-1.77-1-3.29-2.5-4.03v8.05A4.495 4.495 0 0 0 16.5 12zm0-7v2.06c2.89.86 5 3.54 5 6.94s-2.11 6.08-5 6.94V23c4.01-.91 7-4.49 7-9s-2.99-8.09-7-9z"/></svg>
          <label for="s1">Media Volume</label>
          <input id="s1" type="range" min="0" max="100" value="45">
          <span class="small">45%</span>
        </div>
        <div class="row">
          <svg class="slider-icon" viewBox="0 0 24 24"><path d="M12 2a10 10 0 1 0 10 10A10.011 10.011 0 0 0 12 2zm1 11h-5V7h2v4h3z"/></svg>
          <label for="s2">Alarm Volume</label>
          <input id="s2" type="range" min="0" max="100" value="70">
          <span class="small">70%</span>
        </div>
        <div class="row">
          <svg class="slider-icon" viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27a6.471 6.471 0 1 0-.71.71l.27.28v.79L20 21.5 21.5 20l-6-6zM10 15a5 5 0 1 1 0-10 5 5 0 0 1 0 10z"/></svg>
          <label for="s3">Icon Click Callback</label>
          <input id="s3" type="range" min="0" max="100" value="50">
          <span class="small">50%</span>
        </div>
      </div>
      <p id="callbackInfo" class="callback-info">Haz clic en un ícono para ejecutar callback.</p>
    </section>

    <section class="box">
      <div class="preview" id="preview"></div>
      <div class="slider-group">
        <div class="row">
          <label for="rRange">R</label>
          <input id="rRange" type="range" min="0" max="255" value="120">
          <input id="rNum" type="number" min="0" max="255" value="120">
        </div>
        <div class="row">
          <label for="gRange">G</label>
          <input id="gRange" type="range" min="0" max="255" value="160">
          <input id="gNum" type="number" min="0" max="255" value="160">
        </div>
        <div class="row">
          <label for="bRange">B</label>
          <input id="bRange" type="range" min="0" max="255" value="200">
          <input id="bNum" type="number" min="0" max="255" value="200">
        </div>
      </div>
    </section>
  </main>
</body>
</html>
